<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>כלי ציונים — התמונה הטמונה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Heebo:wght@300;400;500;700&display=swap');
:root{--p:#2c3e6b;--pl:#3d5a99;--a:#c9a84c;--al:#f0dfa0;--bg:#f7f4ee;--c:#fff;--t:#2d2a26;--tl:#6b6560;--b:#ddd5c9;--s:#4a8c6f;--e:#c45050;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3,h4{font-family:'Assistant',sans-serif;font-weight:700}
.hdr{background:linear-gradient(135deg,#2c3e6b,#1a2a4f);color:#fff;padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.hdr h1{font-size:1.6rem;font-weight:800}
.hdr .sub{font-size:.9rem;color:var(--al);margin-top:.2rem}
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 80px)}
.sidebar{width:320px;min-width:260px;background:var(--c);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:1rem;border-bottom:1px solid var(--b)}
.sb-search{width:100%;padding:.5rem .8rem;border:1px solid var(--b);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;background:var(--bg)}
.sb-search:focus{outline:none;border-color:var(--pl)}
.sb-stats{display:flex;gap:.5rem;margin-top:.7rem;font-size:.78rem;color:var(--tl)}
.sb-stat{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:.3rem .6rem;text-align:center}
.sb-stat b{display:block;color:var(--p);font-size:1rem}
.sb-list{flex:1;overflow-y:auto;padding:.5rem}
.sb-item{padding:.7rem 1rem;border-radius:8px;cursor:pointer;margin-bottom:.3rem;border:1px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.sb-item:hover{background:var(--bg);border-color:var(--b)}
.sb-item.active{background:rgba(44,62,107,.08);border-color:var(--pl)}
.sb-item .si-name{font-weight:600;font-size:.88rem;color:var(--t)}
.sb-item .si-topic{font-size:.75rem;color:var(--tl);margin-top:.1rem}
.sb-item .si-score{font-size:.88rem;font-weight:700;color:var(--p);white-space:nowrap}
.sb-item .si-score.done{color:var(--s)}
.sb-nav{display:flex;gap:.5rem;padding:.8rem 1rem;border-top:1px solid var(--b);background:var(--bg)}
.sb-nav button{flex:1;padding:.5rem;border:1px solid var(--b);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.82rem;cursor:pointer;background:var(--c);color:var(--p);transition:all .2s}
.sb-nav button:hover{background:var(--p);color:#fff}
.sb-export{padding:.8rem 1rem;border-top:1px solid var(--b)}
.sb-export button{width:100%;padding:.6rem;background:linear-gradient(135deg,var(--s),#3a7058);color:#fff;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem}
.main{flex:1;overflow-y:auto;padding:1.5rem 2rem}
.drop-zone{border:3px dashed var(--b);border-radius:var(--r);padding:3rem;text-align:center;cursor:pointer;background:var(--c);transition:all .3s;max-width:600px;margin:2rem auto}
.drop-zone:hover{border-color:var(--pl);background:#f0edea}
.drop-zone .dz-icon{font-size:3rem;margin-bottom:1rem}
.drop-zone h3{color:var(--p);margin-bottom:.5rem}
.drop-zone p{color:var(--tl);font-size:.9rem}
.drop-zone input[type=file]{display:none}
.grade-header{background:linear-gradient(135deg,rgba(44,62,107,.06),rgba(201,168,76,.08));border:1px solid var(--b);border-radius:var(--r);padding:1.2rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.gh-name{font-size:1.3rem;font-weight:800;color:var(--p)}
.gh-meta{font-size:.85rem;color:var(--tl);margin-top:.2rem}
.gh-score{text-align:center;background:var(--p);color:#fff;border-radius:10px;padding:.8rem 1.5rem;min-width:100px}
.gh-score .gs-num{font-size:2rem;font-weight:800;line-height:1}
.gh-score .gs-lbl{font-size:.75rem;color:var(--al);margin-top:.2rem}
.criterion{background:var(--c);border:1px solid var(--b);border-radius:var(--r);margin-bottom:1.2rem;overflow:hidden;box-shadow:0 1px 6px rgba(44,62,107,.06)}
.cr-head{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;cursor:pointer;transition:background .2s}
.cr-head:hover{background:rgba(44,62,107,.03)}
.cr-title{font-weight:700;color:var(--p);font-size:.95rem;display:flex;align-items:center;gap:.5rem}
.cr-pts{display:flex;align-items:center;gap:.5rem}
.cr-score{font-size:1.1rem;font-weight:700;color:var(--p)}
.cr-max{font-size:.82rem;color:var(--tl)}
.cr-btns{display:flex;gap:.3rem}
.cr-btn{width:28px;height:28px;border:1px solid var(--b);background:var(--bg);border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center}
.cr-btn:hover{background:var(--p);color:#fff;border-color:var(--p)}
.cr-body{padding:0 1.2rem 1.2rem;display:none}
.cr-body.open{display:block}
.cr-slider{display:flex;align-items:center;gap:.8rem;margin:1rem 0}
.cr-slider input[type=range]{flex:1;accent-color:var(--p)}
.cr-slider span{font-size:1rem;font-weight:700;color:var(--p);min-width:2.5rem;text-align:center}
.field-group{margin-bottom:1rem;background:var(--bg);border-radius:8px;padding:.8rem 1rem;border-right:3px solid var(--b)}
.field-group.has-content{border-right-color:var(--s)}
.fg-label{font-size:.78rem;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
.fg-val{font-size:.9rem;color:var(--t);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.fg-img{max-width:300px;border-radius:8px;margin-top:.4rem;border:1px solid var(--b)}
.mapping-tbl{width:100%;border-collapse:collapse;font-size:.88rem;margin:.3rem 0}
.mapping-tbl th{background:var(--p);color:#fff;padding:.4rem .6rem;font-size:.78rem;font-weight:500}
.mapping-tbl td{padding:.4rem .6rem;border:1px solid var(--b)}
.cr-note{width:100%;padding:.6rem .8rem;border:1px solid var(--b);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;background:var(--bg);resize:vertical;min-height:60px;margin-top:.8rem}
.cr-note:focus{outline:none;border-color:var(--pl)}
.completeness-bar{height:8px;background:var(--b);border-radius:4px;overflow:hidden;margin:.5rem 0}
.comp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--s),var(--a));transition:width .3s}
.quiz-score{display:inline-flex;align-items:center;gap:.4rem;background:rgba(74,140,111,.12);color:var(--s);border:1px solid rgba(74,140,111,.3);border-radius:6px;padding:.3rem .7rem;font-size:.85rem;font-weight:600;margin:.3rem .3rem 0 0}
.overall-note{width:100%;padding:.8rem 1rem;border:1px solid var(--b);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.9rem;background:var(--c);resize:vertical;min-height:80px;margin-top:.5rem}
.overall-note:focus{outline:none;border-color:var(--pl)}
.overall-card{background:var(--c);border:2px solid var(--a);border-radius:var(--r);padding:1.2rem 1.5rem;margin-bottom:1.5rem}
.overall-card h3{color:var(--p);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.empty-state{text-align:center;padding:3rem;color:var(--tl);font-size:.95rem}
.empty-state .es-icon{font-size:3rem;margin-bottom:1rem}
.nb-section{background:rgba(44,62,107,.03);border:1px solid var(--b);border-radius:8px;padding:.8rem 1rem;margin-top:.5rem}
.nb-section h5{color:var(--pl);font-size:.82rem;font-weight:700;margin-bottom:.5rem}
.nb-entry{background:var(--c);padding:.4rem .6rem;border-radius:6px;font-size:.82rem;margin-bottom:.3rem;border-right:3px solid var(--a);color:var(--t);line-height:1.6}
.nb-entry .ne-meta{font-size:.7rem;color:var(--tl);margin-bottom:.2rem}
.consent-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;padding:.2rem .5rem;border-radius:10px;font-weight:600;margin-right:.4rem}
.consent-yes{background:rgba(74,140,111,.12);color:var(--s);border:1px solid rgba(74,140,111,.3)}
.consent-no{background:rgba(196,80,80,.1);color:var(--e);border:1px solid rgba(196,80,80,.25)}
@media(max-width:768px){.layout{flex-direction:column;height:auto}.sidebar{width:100%;height:300px;border-left:none;border-bottom:1px solid var(--b)}.main{padding:1rem}}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>📊 כלי ציונים — התמונה הטמונה</h1>
    <div class="sub">ד״ר נאוה כהן | אוניברסיטת בר-אילן</div>
  </div>
  <div style="font-size:.82rem;color:var(--al);text-align:left">
    ← → לניווט בין סטודנטים<br>
    ציונים נשמרים אוטומטית
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-top">
      <input class="sb-search" id="sbSearch" type="text" placeholder="חיפוש לפי שם..." oninput="filterList()">
      <div class="sb-stats">
        <div class="sb-stat"><b id="statTotal">0</b>עבודות</div>
        <div class="sb-stat"><b id="statGraded">0</b>נבדקו</div>
        <div class="sb-stat"><b id="statAvg">—</b>ממוצע</div>
      </div>
    </div>
    <div class="sb-list" id="sbList">
      <div class="empty-state" style="padding:2rem">
        <div class="es-icon">📂</div>
        <div>טענו עבודות כדי להתחיל</div>
      </div>
    </div>
    <div class="sb-nav">
      <button onclick="prevStudent()">→ הקודם</button>
      <button onclick="nextStudent()">← הבא</button>
    </div>
    <div class="sb-export">
      <button onclick="exportCSV()">📊 ייצוא Excel (CSV)</button>
    </div>
  </div>
  <div class="main" id="mainArea">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.style.borderColor='var(--pl)'" ondragleave="this.style.borderColor=''" ondrop="handleDrop(event)">
      <div class="dz-icon">📂</div>
      <h3>לחצו כאן לטעינת עבודות</h3>
      <p>בחרו קבצי JSON מ-Moodle (Cmd+A לבחירת הכל)</p>
      <input type="file" id="fileInput" accept=".json" multiple onchange="loadFiles(this.files)">
    </div>
  </div>
</div>

<script>
// === STATE ===
let students = []; // [{id, name, topic, data}]
let grades = {}; // {studentId: {c1,c2,c3,c4,c5,notes:{c1..c5},overall}}
let currentIdx = -1;
let filteredIds = [];

const CRITERIA = [
  {id:'c1', label:'ניתוח המטפורה', max:30, icon:'🔍'},
  {id:'c2', label:'תמונה ותהליך יצירה', max:20, icon:'🖼️'},
  {id:'c3', label:'פרשנות ועיבוד', max:20, icon:'📖'},
  {id:'c4', label:'רפלקציה', max:20, icon:'💭'},
  {id:'c5', label:'שלמות הגשה', max:10, icon:'✅', auto:true}
];

// === LOAD ===
function loadFiles(files){
  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        const name=(d.studentName||'').trim()||f.name.replace('.json','');
        const topic=(d.productNum||d.category||'').trim();
        const sid=name+'|||'+topic;
        if(!students.find(s=>s.id===sid)){
          students.push({id:sid,name,topic,data:d});
          if(!grades[sid])grades[sid]={c1:0,c2:0,c3:0,c4:0,c5:computeComp(d),notes:{c1:'',c2:'',c3:'',c4:'',c5:''},overall:''};else grades[sid].c5=computeComp(d);if(d._graderDemo){const dm=d._graderDemo;if(dm.c1!==undefined)grades[sid].c1=dm.c1;if(dm.c2!==undefined)grades[sid].c2=dm.c2;if(dm.c3!==undefined)grades[sid].c3=dm.c3;if(dm.c4!==undefined)grades[sid].c4=dm.c4;if(dm.overall)grades[sid].overall=dm.overall;}
        }
      }catch(err){alert('שגיאה בקריאת קובץ: '+f.name)}
    };
    r.readAsText(f);
  });
  setTimeout(()=>{students.sort((a,b)=>a.name.localeCompare(b.name,'he'));filterList();if(currentIdx===-1&&students.length>0)selectStudent(0);updateStats();document.getElementById('dropZone').style.display='none';},300);
}

function handleDrop(e){e.preventDefault();e.currentTarget.style.borderColor='';loadFiles(e.dataTransfer.files);}

function computeComp(d){
  const fields=['category','verse','source','sourceDomain','targetDomain','conceptualMetaphor','mappingExplanation','promptSubject','promptElements','promptBackground','imageRepresents','imageSurprise','lensInvariance','lensBlending','lensEmbodied','aiRole','executionGap','commentatorName','commentaryContent','commentaryImpact','imageComparison','lens2Invariance','lens2Blending','lens2Embodied','reflection1','reflection2','reflection3','reflection4','reflection5'];
  let filled=0;
  fields.forEach(f=>{if((d[f]||'').trim())filled++;});
  if(d.imageData&&d.imageData.image1)filled+=2;
  if(d.imageData&&d.imageData.image2)filled+=2;
  if(d.mappings&&d.mappings.length)filled+=2;
  if(d.artStyle)filled++;
  if(d.aiTool)filled++;
  const total=fields.length+8;
  const pct=Math.min(100,Math.round(filled/total*100));
  return Math.round(pct/10);
}

// === LIST ===
function filterList(){
  const q=(document.getElementById('sbSearch').value||'').toLowerCase();
  filteredIds=students.filter(s=>s.name.toLowerCase().includes(q)||s.topic.toLowerCase().includes(q)).map(s=>s.id);
  renderList();
}

function renderList(){
  const el=document.getElementById('sbList');
  if(!filteredIds.length){el.innerHTML='<div class="empty-state" style="padding:2rem"><div>לא נמצאו סטודנטים</div></div>';return;}
  el.innerHTML=filteredIds.map((sid,i)=>{
    const s=students.find(x=>x.id===sid);
    const g=grades[sid]||{};
    const total=totalScore(sid);
    const graded=total>0;
    const active=students[currentIdx]&&students[currentIdx].id===sid;
    return `<div class="sb-item${active?' active':''}" onclick="selectByIdx(${students.indexOf(s)})">
      <div><div class="si-name">${esc(s.name)}</div><div class="si-topic">${esc(s.topic)||'ללא נושא'}</div></div>
      <div class="si-score${graded?' done':''}">${graded?total+'/100':'—'}</div>
    </div>`;
  }).join('');
}

function selectStudent(idx){
  currentIdx=idx;
  saveGrades();
  renderList();
  renderGrade();
  updateStats();
}

function selectByIdx(idx){selectStudent(idx);}

function prevStudent(){
  if(currentIdx>0)selectStudent(currentIdx-1);
}
function nextStudent(){
  if(currentIdx<students.length-1)selectStudent(currentIdx+1);
}

document.addEventListener('keydown',function(e){
  if(document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='INPUT')return;
  if(e.key==='ArrowLeft'||e.key==='ArrowDown')nextStudent();
  if(e.key==='ArrowRight'||e.key==='ArrowUp')prevStudent();
});

function totalScore(sid){
  const g=grades[sid];if(!g)return 0;
  return (g.c1||0)+(g.c2||0)+(g.c3||0)+(g.c4||0)+(g.c5||0);
}

function updateStats(){
  document.getElementById('statTotal').textContent=students.length;
  const graded=students.filter(s=>totalScore(s.id)>0).length;
  document.getElementById('statGraded').textContent=graded;
  if(graded>0){
    const avg=Math.round(students.filter(s=>totalScore(s.id)>0).reduce((a,s)=>a+totalScore(s.id),0)/graded);
    document.getElementById('statAvg').textContent=avg;
  } else document.getElementById('statAvg').textContent='—';
}

// === GRADE RENDER ===
function renderGrade(){
  if(currentIdx<0||currentIdx>=students.length){
    document.getElementById('mainArea').innerHTML='<div class="empty-state"><div class="es-icon">👆</div><div>בחרו סטודנט מהרשימה</div></div>';
    return;
  }
  const s=students[currentIdx];
  const d=s.data;
  const g=grades[s.id]||(grades[s.id]={c1:0,c2:0,c3:0,c4:0,c5:computeComp(d),notes:{c1:'',c2:'',c3:'',c4:'',c5:''},overall:''});
  const total=totalScore(s.id);
  const comp=g.c5;
  const researchBadge=d.researchConsent==='yes'
    ?'<span class="consent-badge consent-yes">✓ הסכים/ה למחקר</span>'
    :'<span class="consent-badge consent-no">✗ ללא הסכמה למחקר</span>';

  let quizH='';
  if(d.introQuizScore)quizH+=`<span class="quiz-score">מבחן מבוא: ${esc(String(d.introQuizScore))}</span>`;
  if(d.articleQuizScore)quizH+=`<span class="quiz-score">מבחן מאמר: ${esc(String(d.articleQuizScore))}</span>`;

  const compPct=Math.min(100,comp*10);
  const compH=`<div style="margin:.5rem 0"><div style="display:flex;justify-content:space-between;font-size:.8rem;color:var(--tl);margin-bottom:.3rem"><span>שלמות הגשה</span><span>${compPct}%</span></div><div class="completeness-bar"><div class="comp-fill" style="width:${compPct}%"></div></div></div>`;

  // Build criterion sections
  const critH=CRITERIA.map(cr=>{
    const score=g[cr.id]||0;
    const noteVal=g.notes&&g.notes[cr.id]?g.notes[cr.id]:'';
    let contentH='';
    if(cr.id==='c1'){
      contentH=`
        ${fv('קטגוריה',d.category)}
        ${fv('הפסוק',d.verse)}
        ${fv('מקור',d.source)}
        ${fv('תחום מקור',d.sourceDomain)}
        ${fv('תחום יעד',d.targetDomain)}
        ${fv('מטפורה מושגית',d.conceptualMetaphor)}
        ${mappingH(d.mappings)}
        ${fv('הסבר המיפוי',d.mappingExplanation)}`;
    } else if(cr.id==='c2'){
      contentH=`
        ${fv('כלי AI',d.aiTool)}
        ${fv('סגנון ויזואלי',d.artStyle)}
        ${d.imageData&&d.imageData.image1?`<div class="field-group has-content"><div class="fg-label">תמונה ראשונית</div><img class="fg-img" src="${d.imageData.image1}"></div>`:''}
        ${fv('מה מייצגת התמונה',d.imageRepresents)}
        ${fv('הפתעה בתמונה',d.imageSurprise)}
        ${fv('עדשה 1 — שימור מבנה',d.lensInvariance)}
        ${fv('עדשה 2 — משמעות חדשה',d.lensBlending)}
        ${fv('עדשה 3 — בחירות מרחביות',d.lensEmbodied)}
        ${fv('תפקיד ה-AI',d.aiRole)}
        ${fv('פער הבנה-ביצוע',d.executionGap)}`;
    } else if(cr.id==='c3'){
      contentH=`
        ${fv('פרשן נבחר',d.commentatorName)}
        ${fv('תוכן הפרשנות',d.commentaryContent)}
        ${fv('השפעה על הבנת המטפורה',d.commentaryImpact)}
        ${d.imageData&&d.imageData.image2?`<div class="field-group has-content"><div class="fg-label">תמונה מעודכנת</div><img class="fg-img" src="${d.imageData.image2}"></div>`:''}
        ${fv('השוואה בין התמונות',d.imageComparison)}
        ${fv('עדשה 1 — שימור',d.lens2Invariance)}
        ${fv('עדשה 2 — משמעות',d.lens2Blending)}
        ${fv('עדשה 3 — שינויים מרחביים',d.lens2Embodied)}`;
    } else if(cr.id==='c4'){
      contentH=[1,2,3,4,5].map(i=>fv('שאלה '+i,d['reflection'+i])).join('');
    } else if(cr.id==='c5'){
      contentH=compH;
    }
    const isAuto=cr.auto;
    return `<div class="criterion">
      <div class="cr-head" onclick="toggleCr('${cr.id}')">
        <div class="cr-title">${cr.icon} ${cr.label}</div>
        <div class="cr-pts">
          <div class="cr-score" id="sc_${cr.id}">${score}</div>
          <div class="cr-max">/ ${cr.max}</div>
          ${!isAuto?`<div class="cr-btns">
            <button class="cr-btn" onclick="event.stopPropagation();adj('${cr.id}',-1)">−</button>
            <button class="cr-btn" onclick="event.stopPropagation();adj('${cr.id}',+1)">+</button>
          </div>`:''}
        </div>
      </div>
      <div class="cr-body" id="body_${cr.id}">
        ${!isAuto?`<div class="cr-slider"><span>0</span><input type="range" min="0" max="${cr.max}" value="${score}" id="sl_${cr.id}" oninput="setScore('${cr.id}',+this.value)"><span>${cr.max}</span></div>`:''}
        ${contentH}
        ${!isAuto?`<textarea class="cr-note" id="note_${cr.id}" placeholder="הערות לקריטריון זה..." onchange="setNote('${cr.id}',this.value)">${esc(noteVal)}</textarea>`:''}
      </div>
    </div>`;
  }).join('');

  // Notebook
  let nbH='';
  if(d.nbNotes||(d.notebook&&d.notebook.length)){
    const notes=d.nbNotes||d.notebook||{};
    let allNotes=[];
    if(Array.isArray(notes)){allNotes=notes;}
    else{Object.values(notes).forEach(arr=>{if(Array.isArray(arr))allNotes=allNotes.concat(arr);});}
    if(allNotes.length){
      nbH=`<div class="criterion"><div class="cr-head" onclick="toggleCr('nb')"><div class="cr-title">📓 מחברת הסטודנט/ית</div></div>
      <div class="cr-body" id="body_nb">
        <div class="nb-section"><h5>רשומות מחברת</h5>
        ${allNotes.map(n=>`<div class="nb-entry"><div class="ne-meta">${esc(n.time||'')}</div>${esc(n.text||'')}</div>`).join('')}
        </div></div></div>`;
    }
  }

  document.getElementById('mainArea').innerHTML=`
    <div class="grade-header">
      <div>
        <div class="gh-name">${esc(s.name)}</div>
        <div class="gh-meta">${esc(s.topic)||'ללא נושא'} &nbsp;|&nbsp; ${d.timestamp?new Date(d.timestamp).toLocaleDateString('he-IL'):''} &nbsp;|&nbsp; ${researchBadge} ${quizH}</div>
      </div>
      <div class="gh-score">
        <div class="gs-num" id="totalDisplay">${total}</div>
        <div class="gs-lbl">/ 100</div>
      </div>
      <button onclick="exportStudentPDF()" style="background:linear-gradient(135deg,#2c3e6b,#1a2a4f);color:#fff;border:none;border-radius:8px;padding:.6rem 1.2rem;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.4rem;white-space:nowrap">📄 ייצוא PDF לסטודנט</button>
    </div>
    ${critH}
    ${nbH}
    <div class="overall-card">
      <h3>📝 הערה כללית</h3>
      <textarea class="overall-note" id="overallNote" placeholder="הערה כוללת לעבודה..." onchange="setOverall(this.value)">${esc(g.overall||'')}</textarea>
    </div>`;
}

function fv(label, val){
  const has=(val||'').trim();
  return `<div class="field-group${has?' has-content':''}"><div class="fg-label">${label}</div><div class="fg-val">${has?esc(val):'<span style="color:#bbb">לא מולא</span>'}</div></div>`;
}

function mappingH(mappings){
  if(!mappings||!mappings.length)return fv('מיפויים','');
  const rows=mappings.map(m=>`<tr><td>${esc(m.source||'')}</td><td style="text-align:center;color:var(--a)">→</td><td>${esc(m.target||'')}</td></tr>`).join('');
  return `<div class="field-group has-content"><div class="fg-label">מיפויים</div><table class="mapping-tbl"><tr><th>מקור</th><th>→</th><th>יעד</th></tr>${rows}</table></div>`;
}

function toggleCr(id){
  const b=document.getElementById('body_'+id);
  if(b)b.classList.toggle('open');
}

function adj(cid, delta){
  if(currentIdx<0)return;
  const s=students[currentIdx];
  const cr=CRITERIA.find(c=>c.id===cid);
  if(!cr||cr.auto)return;
  const g=grades[s.id];
  g[cid]=Math.max(0,Math.min(cr.max,(g[cid]||0)+delta));
  const sl=document.getElementById('sl_'+cid);
  if(sl)sl.value=g[cid];
  document.getElementById('sc_'+cid).textContent=g[cid];
  updateTotal();
  saveGrades();
}

function setScore(cid, val){
  if(currentIdx<0)return;
  const s=students[currentIdx];
  const cr=CRITERIA.find(c=>c.id===cid);
  if(!cr||cr.auto)return;
  grades[s.id][cid]=Math.max(0,Math.min(cr.max,val));
  document.getElementById('sc_'+cid).textContent=grades[s.id][cid];
  updateTotal();
  saveGrades();
}

function setNote(cid, val){
  if(currentIdx<0)return;
  const g=grades[students[currentIdx].id];
  if(!g.notes)g.notes={};
  g.notes[cid]=val;
  saveGrades();
}

function setOverall(val){
  if(currentIdx<0)return;
  grades[students[currentIdx].id].overall=val;
  saveGrades();
}

function updateTotal(){
  const t=totalScore(students[currentIdx].id);
  const el=document.getElementById('totalDisplay');
  if(el)el.textContent=t;
  renderList();
  updateStats();
}

// === PERSISTENCE ===
function saveGrades(){
  try{localStorage.setItem('hatmuna_grades',JSON.stringify(grades));}catch(e){}
}
function loadGrades(){
  try{const r=localStorage.getItem('hatmuna_grades');if(r)grades=JSON.parse(r);}catch(e){}
}

// === CSV EXPORT ===
function exportCSV(){
  if(!students.length){alert('אין נתונים לייצוא');return;}
  const rows=[['שם סטודנט','נושא','ניתוח מטפורה (30)','תמונה ותהליך (20)','פרשנות (20)','רפלקציה (20)','שלמות (10)','סה"כ','הערה כללית','הסכמה למחקר']];
  students.forEach(s=>{
    const g=grades[s.id]||{};
    const total=totalScore(s.id);
    rows.push([s.name,s.topic,g.c1||0,g.c2||0,g.c3||0,g.c4||0,g.c5||0,total,g.overall||'',s.data.researchConsent||'לא ידוע']);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  const d=new Date().toISOString().slice(0,10);
  a.download=`ציונים_התמונה_הטמונה_${d}.csv`;a.click();
}

// === UTILS ===
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  const html=`<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<title>פירוט ציון — ${esc(s.name)}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Heebo:wght@300;400;500;700&display=swap');

body{font-family:'Heebo',sans-serif;background:#fff;color:#2d2a26;padding:2.5rem;max-width:720px;margin:0 auto}
h1,h2,h3{font-family:'Assistant',sans-serif}
@media print{body{padding:1.5rem}button{display:none!important}}
</style></head><body>
<div style="background:linear-gradient(135deg,#2c3e6b,#1a2a4f);color:#fff;border-radius:10px;padding:1.8rem 2rem;margin-bottom:2rem">
  <div style="font-size:.85rem;color:#f0dfa0;margin-bottom:.3rem">אוניברסיטת בר-אילן | ד״ר נאוה כהן | התמונה הטמונה</div>
  <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:.3rem">פירוט ציון</h1>
  <div style="font-size:.82rem;color:rgba(255,255,255,.7)">${date}</div>
</div>

<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap">
  <div>
    <h2 style="font-size:1.4rem;color:#2c3e6b;margin-bottom:.3rem">${esc(s.name)}</h2>
    <div style="color:#6b6560;font-size:.9rem;margin-bottom:.4rem">${esc(s.topic)}</div>
    <div style="font-size:.8rem;color:#888">${researchTxt}</div>
  </div>
  <div style="background:#2c3e6b;color:#fff;border-radius:12px;padding:1rem 1.8rem;text-align:center;min-width:110px">

<table style="width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e8e0d6;margin-bottom:2rem">

    <th style="padding:.7rem .8rem;text-align:center;font-size:.82rem;color:#6b6560;font-weight:600">ציון</th>
    <th style="padding:.7rem .8rem;text-align:center;font-size:.82rem;color:#6b6560;font-weight:600">מקסימום</th>

${g.overall?`<div style="background:#fffbf2;border:2px solid #c9a84c;border-radius:10px;padding:1.2rem 1.5rem;margin-bottom:2rem">

// === INIT ===
loadGrades();
